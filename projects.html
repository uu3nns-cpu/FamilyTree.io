<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWS3BEEQ84"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RWS3BEEQ84');
    </script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9257454501555292" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로젝트 - 결속</title>

    <!-- 테마 초기화 (깜박임 방지) -->
    <script>
        (function() {
            var legacy = localStorage.getItem('theme') || localStorage.getItem('app_theme');
            if (legacy && !localStorage.getItem('gyeolsok-theme')) {
                localStorage.setItem('gyeolsok-theme', legacy);
            }
            var savedTheme = localStorage.getItem('gyeolsok-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.style.colorScheme = savedTheme;
        })();
    </script>

    <!-- CSS: index.html과 동일한 스타일 시스템 -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/shared-header.css">
    <link rel="stylesheet" href="css/shared-footer.css">

    <style>
        /* =============================================
           Body / Layout
           ============================================= */
        html, body {
            min-height: 100%;
            height: auto;
            overflow: auto;
        }
        body {
            display: flex;
            flex-direction: column;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            padding-bottom: 60px;
        }

        /* =============================================
           Button System
           ============================================= */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            line-height: 1.4;
            white-space: nowrap;
            font-family: inherit;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-sm { padding: 5px 12px; font-size: 0.8125rem; border-radius: 6px; }

        .btn-primary {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--color-primary-hover);
            border-color: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59,130,246,0.35);
        }

        .btn-ghost {
            background: transparent;
            color: var(--color-text-secondary);
            border-color: var(--color-border-primary);
        }
        .btn-ghost:hover:not(:disabled) {
            background: var(--color-bg-secondary);
            color: var(--color-text-primary);
            border-color: var(--color-border-secondary);
        }

        .btn-danger {
            background: var(--color-danger);
            color: #fff;
            border-color: var(--color-danger);
        }
        .btn-danger:hover:not(:disabled) {
            background: var(--color-danger-hover);
            border-color: var(--color-danger-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239,68,68,0.35);
        }

        /* =============================================
           Page Container
           ============================================= */
        .projects-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        .projects-header {
            margin-bottom: 2rem;
        }

        .projects-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
        }

        .projects-subtitle {
            font-size: 1rem;
            color: var(--color-text-secondary);
        }

        /* =============================================
           Project Grid
           ============================================= */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        /* =============================================
           Project Card
           ============================================= */
        .project-card {
            position: relative;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border-primary);
            border-radius: 16px;
            padding: 1.25rem;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59,130,246,0.12);
        }

        /* =============================================
           Thumbnail
           ============================================= */
        .project-thumbnail {
            width: 100%;
            height: 160px;
            border-radius: 10px;
            margin-bottom: 1rem;
            overflow: hidden;
            position: relative;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-primary);
            flex-shrink: 0;
        }

        .project-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 썸네일 없을 때 플레이스홀더 */
        .project-thumbnail-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        /* =============================================
           Card Info
           ============================================= */
        .project-info {
            flex: 1;
        }

        .project-name {
            font-size: 1rem;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 0.4rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .project-meta {
            font-size: 0.825rem;
            color: var(--color-text-secondary);
            margin-bottom: 0.2rem;
        }

        .project-date {
            font-size: 0.775rem;
            color: var(--color-text-tertiary);
        }

        .project-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.875rem;
            border-top: 1px solid var(--color-border-primary);
        }

        .project-actions button {
            flex: 1;
        }

        /* =============================================
           Empty State (빈 슬롯 없이 데이터 없을 때만)
           ============================================= */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            background: var(--color-bg-secondary);
            border: 1px dashed var(--color-border-secondary);
            border-radius: 16px;
            color: var(--color-text-secondary);
        }

        .empty-state-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: var(--color-text-secondary);
        }

        .empty-state-sub {
            font-size: 0.875rem;
            color: var(--color-text-tertiary);
        }

        /* =============================================
           Modals
           ============================================= */
        .proj-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .proj-modal.show {
            display: flex !important;
        }
        .proj-modal-dialog {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border-secondary);
            border-radius: 14px;
            padding: 2rem;
            width: min(90%, 440px);
            box-shadow: 0 24px 64px rgba(0,0,0,0.55);
        }
        .proj-modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin: 0 0 1.25rem;
        }
        .proj-modal-body {
            margin-bottom: 1.5rem;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }
        .proj-modal-footer {
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        /* Form elements */
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        .form-input {
            width: 100%;
            padding: 0.6rem 0.875rem;
            background: var(--color-bg-tertiary);
            border: 1px solid var(--color-border-primary);
            border-radius: 8px;
            color: var(--color-text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: border-color 0.15s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
        }
        .form-help {
            font-size: 0.8rem;
            color: var(--color-text-tertiary);
            margin-top: 0.3rem;
        }

        /* =============================================
           Responsive
           ============================================= */
        @media (max-width: 1024px) {
            .projects-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 640px) {
            .projects-container { padding: 1rem; }
            .projects-grid { grid-template-columns: 1fr; }
            .projects-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- Header (headerLoader.js가 주입) -->

    <main class="projects-container">
        <div class="projects-header">
            <h1 class="projects-title">내 프로젝트</h1>
            <p class="projects-subtitle">최대 9개의 프로젝트를 저장하고 관리할 수 있습니다.</p>
        </div>

        <div class="projects-grid" id="projectsGrid">
            <!-- 동적 생성 -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="dashboard-footer"></footer>

    <!-- 프로젝트 이름 입력 모달 -->
    <div class="proj-modal" id="saveModal">
        <div class="proj-modal-dialog">
            <h3 class="proj-modal-title">프로젝트 저장</h3>
            <div class="proj-modal-body">
                <div class="form-group">
                    <label class="form-label" for="projectNameInput">프로젝트 이름</label>
                    <input
                        type="text"
                        id="projectNameInput"
                        class="form-input"
                        placeholder="예: 김철수 가족 관계도"
                        maxlength="50"
                    >
                    <div class="form-help">최대 50자까지 입력할 수 있습니다.</div>
                </div>
            </div>
            <div class="proj-modal-footer">
                <button class="btn btn-ghost" onclick="closeSaveModal()">취소</button>
                <button class="btn btn-primary" onclick="saveProject()">저장</button>
            </div>
        </div>
    </div>

    <!-- 삭제 확인 모달 -->
    <div class="proj-modal" id="deleteModal">
        <div class="proj-modal-dialog">
            <h3 class="proj-modal-title">프로젝트 삭제</h3>
            <div class="proj-modal-body">
                <p style="color: var(--color-text-primary);">정말로 이 프로젝트를 삭제하시겠습니까?</p>
                <p style="color: var(--color-danger); font-size: 0.9rem; margin-top: 0.5rem;">
                    이 작업은 취소할 수 없습니다.
                </p>
            </div>
            <div class="proj-modal-footer">
                <button class="btn btn-ghost" onclick="closeDeleteModal()">취소</button>
                <button class="btn btn-danger" onclick="confirmDelete()">삭제</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- headerLoader.js: index.html과 동일한 헤더/푸터/테마 시스템 -->
    <script src="js/headerLoader.js"></script>
    <script src="js/projects/projectsManager.js"></script>
</body>
</html>
