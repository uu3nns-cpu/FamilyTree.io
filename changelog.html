<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RWS3BEEQ84"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RWS3BEEQ84');
    </script>
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9257454501555292" crossorigin="anonymous"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>업데이트 내역 - 결속</title>

    <!-- 테마 초기화 (깜박임 방지) -->
    <script>
        (function() {
            var legacy = localStorage.getItem('theme') || localStorage.getItem('app_theme');
            if (legacy && !localStorage.getItem('gyeolsok-theme')) {
                localStorage.setItem('gyeolsok-theme', legacy);
            }
            var savedTheme = localStorage.getItem('gyeolsok-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.documentElement.style.colorScheme = savedTheme;
        })();
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

    <!-- Shared Header & Footer Styles -->
    <link rel="stylesheet" href="css/shared-header.css">
    <link rel="stylesheet" href="css/shared-footer.css">

    <!-- Cookie Consent -->
    <link rel="stylesheet" href="css/cookie-consent.css">
    <script src="js/cookie-consent.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 56px;
        }

        .changelog-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border-primary);
            border-radius: 1rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--color-text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--color-text-primary);
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .version-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin: 2rem 0;
        }

        .version-info h3 {
            color: rgba(59, 130, 246, 1);
            font-size: 1.2rem;
            margin: 0 0 0.75rem 0;
        }

        .version-info p {
            color: var(--color-text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 0.5rem;
            color: var(--color-text-primary);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <!-- Header will be loaded by headerLoader.js -->

    <div class="changelog-container">
        <h1>📝 업데이트 내역</h1>
        <p class="subtitle">결속(Gyeolsok) 버전별 변경사항</p>

        <div class="version-info">
            <h3>🎉 버전 1.0.0 - 첫 출시</h3>
            <p>결속(Gyeolsok)이 정식으로 출시되었습니다. 가계도를 쉽고 직관적으로 만들 수 있는 도구를 제공합니다.</p>
        </div>

        <div class="empty-state">
            <div class="icon">📦</div>
            <h2>아직 업데이트가 없습니다</h2>
            <p>
                새로운 기능이나 개선사항이 추가되면<br>
                이곳에서 확인하실 수 있습니다.
            </p>
        </div>

        <div class="footer">
            <a href="index.html" class="back-button">
                ← 홈으로 돌아가기
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="dashboard-footer"></footer>

    <!-- JavaScript -->
    <script src="js/headerLoader.js"></script>
</body>
</html>
